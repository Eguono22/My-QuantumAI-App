name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      
      - name: Run tests
        run: |
          python -m pytest tests/backend/ -v --tb=short

  frontend-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: cd frontend && npm install
      
      - name: Build
        run: cd frontend && npm run build
        env:
          CI: false

  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [backend-tests]
    steps:
      - uses: actions/checkout@v4
      
      - name: Build backend Docker image
        run: docker build -f docker/backend.Dockerfile -t quantumai-backend .
      
      - name: Build frontend Docker image
        run: docker build -f docker/frontend.Dockerfile -t quantumai-frontend .
