version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:8002}
      - REACT_APP_WS_URL=${REACT_APP_WS_URL:-ws://localhost:8002}

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports:
      - "8002:8000"
    depends_on:
      - db
      - redis
    environment:
      - "SECRET_KEY=${SECRET_KEY:-dev-local-secret-key-please-change}"
      - REDIS_URL=redis://redis:6379
      - "CORS_ORIGINS=${CORS_ORIGINS:-[\"http://localhost:3000\",\"http://localhost:3001\"]}"

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=quantumai
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
