version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=https://quantumalpha.ai/api
      - REACT_APP_WS_URL=wss://quantumalpha.ai

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-changeme}@db:5432/quantumai
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set (generate with: openssl rand -hex 32)}
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGINS=["https://quantumalpha.ai","https://www.quantumalpha.ai"]

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=quantumai
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
