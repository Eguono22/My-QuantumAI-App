<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#121212" />
    <meta name="description" content="Quantum AI Trading Platform" />
    <title>QuantumAI Trading</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Barlow', 'sans-serif'],
              display: ['Barlow Condensed', 'sans-serif']
            },
            colors: {
              market: {
                black: '#151515',
                dark: '#262626',
                yellow: '#ffbf00',
                paper: '#f5f5f5',
                line: '#dedede',
                text: '#1f1f1f'
              },
            },
            boxShadow: {
              panel: '0 2px 8px rgba(0, 0, 0, 0.08)',
            },
            keyframes: {
              fadeRise: {
                '0%': { opacity: '0', transform: 'translateY(12px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' }
              },
              ticker: {
                '0%': { transform: 'translateX(0)' },
                '100%': { transform: 'translateX(-50%)' }
              }
            },
            animation: {
              fadeRise: 'fadeRise 600ms ease-out forwards',
              ticker: 'ticker 36s linear infinite'
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --market-black: #151515;
        --market-dark: #262626;
        --market-yellow: #ffbf00;
        --market-paper: #f5f5f5;
        --market-line: #dedede;
        --market-text: #1f1f1f;
        --market-muted: #6a6a6a;
      }

      body {
        margin: 0;
        color: var(--market-text);
        background:
          radial-gradient(circle at 3% 4%, rgba(0, 0, 0, 0.03), transparent 16%),
          linear-gradient(180deg, #f7f7f7 0%, #efefef 100%);
      }

      #root {
        min-height: 100vh;
      }

      .market-panel {
        background: #fff;
        border: 1px solid var(--market-line);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      }

      .market-panel-soft {
        background: #fafafa;
        border: 1px solid var(--market-line);
      }

      .market-input,
      .market-select {
        width: 100%;
        border: 1px solid #cfcfcf;
        background: #fff;
        color: var(--market-text);
      }

      .market-input:focus,
      .market-select:focus {
        outline: none;
        border-color: var(--market-yellow);
        box-shadow: 0 0 0 2px rgba(255, 191, 0, 0.25);
      }

      .market-btn-primary {
        background: var(--market-yellow);
        color: #191919;
        border: 1px solid #d69f00;
      }

      .market-btn-primary:hover {
        background: #f2b600;
      }

      .market-btn-dark {
        background: var(--market-black);
        color: #fff;
        border: 1px solid #000;
      }

      .market-btn-dark:hover {
        background: #000;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
