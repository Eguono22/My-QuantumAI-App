<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#121212" />
    <meta name="description" content="Quantum AI Trading Platform" />
    <title>Quantum AI Trading Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      (function bootstrapQuantumAppShell() {
        var root = document.documentElement;
        var storage = window.localStorage;
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;

        var defaults = {
          apiBaseUrl: window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:8000'
            : '/api',
          appVersion: '1.0.0',
          environment: window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'development'
            : 'production',
          supportedLanguages: ['en', 'nl', 'fr'],
        };

        var existing = window.globalConfig || {};
        window.globalConfig = Object.assign({}, defaults, existing);

        var theme = storage.getItem('app_pref_theme') || storage.getItem('theme') || (prefersDark ? 'dark' : 'light');
        storage.setItem('app_pref_theme', theme);
        storage.setItem('theme', theme);
        root.setAttribute('data-theme', theme);
        root.classList.toggle('dark-mode', theme === 'dark');

        if (!storage.getItem('app_pref_language')) storage.setItem('app_pref_language', 'en');
        if (!storage.getItem('app_pref_layout')) storage.setItem('app_pref_layout', 'trader-pro');
        if (!storage.getItem('app_pref_ai_model')) storage.setItem('app_pref_ai_model', 'quantum-core-v1');
        if (!storage.getItem('app_pref_portfolio_view')) storage.setItem('app_pref_portfolio_view', 'overview');
      })();
    </script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Barlow', 'sans-serif'],
              display: ['Barlow Condensed', 'sans-serif']
            },
            colors: {
              market: {
                black: '#151515',
                dark: '#262626',
                yellow: '#ffbf00',
                paper: '#f5f5f5',
                line: '#dedede',
                text: '#1f1f1f'
              },
            },
            boxShadow: {
              panel: '0 2px 8px rgba(0, 0, 0, 0.08)',
            },
            keyframes: {
              fadeRise: {
                '0%': { opacity: '0', transform: 'translateY(12px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' }
              },
              ticker: {
                '0%': { transform: 'translateX(0)' },
                '100%': { transform: 'translateX(-50%)' }
              }
            },
            animation: {
              fadeRise: 'fadeRise 600ms ease-out forwards',
              ticker: 'ticker 36s linear infinite'
            }
          }
        }
      }
    </script>
    <style>
      :root {
        color-scheme: light;
        --market-black: #151515;
        --market-dark: #262626;
        --market-yellow: #ffbf00;
        --market-paper: #f5f5f5;
        --market-line: #dedede;
        --market-text: #1f1f1f;
        --market-muted: #6a6a6a;
        --panel-bg: #ffffff;
        --panel-soft-bg: #fafafa;
        --input-bg: #ffffff;
        --page-bg:
          radial-gradient(circle at 3% 4%, rgba(0, 0, 0, 0.03), transparent 16%),
          linear-gradient(180deg, #f7f7f7 0%, #efefef 100%);
      }

      html[data-theme='dark'] {
        color-scheme: dark;
        --market-black: #0b1220;
        --market-dark: #111827;
        --market-yellow: #f9c74f;
        --market-paper: #0f172a;
        --market-line: #27354d;
        --market-text: #e5e7eb;
        --market-muted: #9ca3af;
        --panel-bg: #0f172a;
        --panel-soft-bg: #111827;
        --input-bg: #0b1220;
        --page-bg:
          radial-gradient(circle at 3% 4%, rgba(34, 211, 238, 0.09), transparent 26%),
          linear-gradient(180deg, #050a13 0%, #0b1220 100%);
      }

      body {
        margin: 0;
        color: var(--market-text);
        background: var(--page-bg);
      }

      #root {
        min-height: 100vh;
      }

      .market-panel {
        background: var(--panel-bg);
        border: 1px solid var(--market-line);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      }

      .market-panel-soft {
        background: var(--panel-soft-bg);
        border: 1px solid var(--market-line);
      }

      .market-input,
      .market-select {
        width: 100%;
        border: 1px solid #cfcfcf;
        background: var(--input-bg);
        color: var(--market-text);
      }

      .market-input:focus,
      .market-select:focus {
        outline: none;
        border-color: var(--market-yellow);
        box-shadow: 0 0 0 2px rgba(255, 191, 0, 0.25);
      }

      html[data-theme='dark'] .market-input,
      html[data-theme='dark'] .market-select {
        border-color: #334155;
      }

      .market-btn-primary {
        background: var(--market-yellow);
        color: #191919;
        border: 1px solid #d69f00;
      }

      .market-btn-primary:hover {
        background: #f2b600;
      }

      .market-btn-dark {
        background: var(--market-black);
        color: #fff;
        border: 1px solid #000;
      }

      .market-btn-dark:hover {
        background: #000;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="app-shell" data-layout="web-app">
      <header id="shell-header" hidden></header>
      <aside id="shell-sidebar" hidden></aside>
      <main id="shell-main">
        <div id="root"></div>
      </main>
      <section id="shell-notifications" hidden></section>
    </div>
  </body>
</html>
