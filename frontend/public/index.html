<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a111f" />
    <meta name="description" content="Quantum AI Trading Platform" />
    <title>QuantumAI Trading</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Sora', 'sans-serif'],
              display: ['Space Grotesk', 'sans-serif']
            },
            colors: {
              deep: {
                950: '#070b16',
                900: '#0d1426',
                800: '#1a2440',
              },
              accent: {
                300: '#22d3ee',
                500: '#06b6d4',
                700: '#0e7490',
              },
              ember: {
                300: '#fcd34d',
                500: '#f59e0b',
                700: '#b45309',
              }
            },
            boxShadow: {
              glow: '0 0 40px rgba(34, 211, 238, 0.2)',
            },
            keyframes: {
              floatSlow: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-12px)' }
              },
              fadeRise: {
                '0%': { opacity: '0', transform: 'translateY(12px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' }
              }
            },
            animation: {
              floatSlow: 'floatSlow 8s ease-in-out infinite',
              fadeRise: 'fadeRise 600ms ease-out forwards'
            }
          }
        }
      }
    </script>
    <style>
      body {
        background: radial-gradient(circle at 15% 10%, rgba(34, 211, 238, 0.14), transparent 32%),
                    radial-gradient(circle at 80% 0%, rgba(245, 158, 11, 0.14), transparent 28%),
                    linear-gradient(170deg, #070b16 0%, #0a111f 55%, #10182b 100%);
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
